---
# Service for llama.cpp running on host
apiVersion: v1
kind: Service
metadata:
  name: llama-cpp-qwen
  namespace: ai-inference
  labels:
    app: llama-cpp-qwen
    component: llm-inference
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8083
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
---
# Endpoints pointing to host's llama.cpp service
apiVersion: v1
kind: Endpoints
metadata:
  name: llama-cpp-qwen
  namespace: ai-inference
subsets:
  - addresses:
    - ip: 10.1.1.110  # zephyr's IP address
    ports:
      - name: http
        port: 8083
        protocol: TCP
      - name: metrics
        port: 9090
        protocol: TCP
