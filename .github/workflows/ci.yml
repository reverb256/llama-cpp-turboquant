name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  parse-check:
    name: Parse Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Parse all Nix files
        run: |
          FAILED=0
          find . -name "*.nix" -not -path "./.git/*" | while read -r f; do
            if ! nix-instantiate --parse "$f" > /dev/null 2>&1; then
              echo "PARSE ERROR: $f"
              FAILED=1
            fi
          done
          exit $FAILED

  build:
    name: Build llama-cpp-turboquant
    runs-on: ubuntu-latest
    needs: [parse-check]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v14
        with:
          name: reverb256
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN || '' }}
          extraPullNames: nixos-community
      - name: Build
        run: nix build .#llama-cpp-turboquant
      - name: Verify binary
        run: |
          ./result/bin/llama-server --version 2>&1 || \
          ./result/bin/llama-cli --version 2>&1 || \
          echo "Binary found, version check may vary" && ls -la ./result/bin/
